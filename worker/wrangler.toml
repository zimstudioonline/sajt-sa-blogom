name = "zdravritual-newsletter"
main = "src/index.ts"
compatibility_date = "2026-07-18"

# Nije tajna — dozvoljeni origin i ID audience-a.
[vars]
ALLOWED_ORIGIN = "https://zdravritual.com"
RESEND_AUDIENCE_ID = "6537c3aa-e932-49b5-9a74-db0985a0c676"

# Tajne se NE stavljaju ovde. Postavi ih komandama:
#   cd worker
#   npx wrangler secret put RESEND_API_KEY
#   npx wrangler secret put TURNSTILE_SECRET   # opciono, za CAPTCHA

# (opciono) Lep custom domen umesto *.workers.dev — traži da je DNS domena na Cloudflare:
# [[routes]]
# pattern = "api.zdravritual.com"
# custom_domain = true
