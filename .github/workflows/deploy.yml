name: Deploy na GitHub Pages

# Build statičkog Next.js export-a i objava na GitHub Pages pri svakom push-u na main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Dozvole potrebne za GitHub Pages deploy.
permissions:
  contents: read
  pages: write
  id-token: write

# Jedan deploy u isto vreme; ne prekidaj započeti.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (static export)
        run: npm run build
        env:
          # Javne varijable — ubacuju se u frontend na build-u.
          # Podesi ih u: Settings → Secrets and variables → Actions → Variables.
          NEXT_PUBLIC_NEWSLETTER_ENDPOINT: ${{ vars.NEXT_PUBLIC_NEWSLETTER_ENDPOINT }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
